<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Superside Pride 2026 — Profile Maker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter+Tight:ital,wght@0,400;0,500;0,600;0,700;0,800;1,600&display=swap" rel="stylesheet" />
<style>
  :root {
    --pine: #0A211F;
    --spark: #D8FF85;
    --cloud: #F7F9F2;
    --leaf: #2A4E45;
    --pine-2: #11302C;
    --line: rgba(247,249,242,0.12);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    background: var(--pine);
    color: var(--cloud);
    font-family: "Inter Tight", -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 36px 28px 56px; }
  .hd { display: flex; align-items: center; gap: 18px; margin-bottom: 30px; }
  .hd-heart { width: 58px; height: auto; }
  .hd-text h1 { margin: 0; font-size: 30px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
  .hd-text h1 span { color: var(--spark); }
  .hd-text p { margin: 7px 0 0; color: rgba(247,249,242,0.62); font-size: 15px; }
  .stagewrap { display: grid; grid-template-columns: minmax(0,1fr) 380px; gap: 28px; align-items: start; }
  .stage { position: sticky; top: 28px; }
  .canvasbox {
    background: var(--pine-2);
    border: 1px solid var(--line);
    border-radius: 22px;
    padding: 22px;
    display: flex; justify-content: center;
    transition: border-color .15s, background .15s;
  }
  .canvasbox.over { border-color: var(--spark); background: #14352f; }
  .canvasbox canvas {
    width: 100%; max-width: 540px; height: auto; aspect-ratio: 1;
    border-radius: 8px; touch-action: none; display: block;
  }
  .stagehint { text-align: center; margin-top: 14px; font-size: 13px; color: rgba(247,249,242,0.5); }
  .panel {
    background: var(--cloud); color: var(--pine);
    border-radius: 22px;
    display: flex; flex-direction: column;
    position: sticky; top: 28px;
    max-height: calc(100vh - 56px);
    overflow: hidden;
  }
  .panel-body { display: flex; flex-direction: column; gap: 22px; padding: 22px; overflow-y: auto; flex: 1 1 auto; min-height: 0; }
  .panel-foot { padding: 15px 22px 18px; border-top: 1px solid rgba(10,33,31,0.09); background: var(--cloud); display: flex; flex-direction: column; gap: 9px; flex: none; }
  .block { display: flex; flex-direction: column; }
  .lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.09em; color: var(--leaf); margin-bottom: 10px; }
  .btn { border: none; cursor: pointer; font-family: inherit; font-weight: 600; font-size: 15px; border-radius: 12px; padding: 13px 16px; transition: transform .08s, background .15s, box-shadow .15s; }
  .btn:active { transform: translateY(1px); }
  .block-btn { background: var(--pine); color: var(--cloud); }
  .block-btn:hover { background: #15403a; }
  .fname { font-size: 12px; color: var(--leaf); margin-top: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .zoomrow { display: flex; align-items: center; gap: 12px; margin-top: 14px; }
  .zlbl { font-size: 12px; font-weight: 600; color: var(--leaf); width: 38px; }
  input[type=range] { -webkit-appearance: none; appearance: none; flex: 1; height: 5px; border-radius: 4px; background: #d9e0cf; outline: none; }
  input[type=range]:disabled { opacity: .45; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: var(--pine); cursor: pointer; border: 3px solid var(--spark); }
  input[type=range]::-moz-range-thumb { width: 18px; height: 18px; border-radius: 50%; background: var(--pine); cursor: pointer; border: 3px solid var(--spark); }
  .layouts { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
  .lcard { border: 2px solid transparent; background: #eef1e6; cursor: pointer; border-radius: 14px; padding: 8px; display: flex; flex-direction: column; align-items: center; gap: 2px; font-family: inherit; transition: border-color .12s, background .12s; }
  .lcard:hover { background: #e6ebd9; }
  .lcard.on { border-color: var(--pine); background: #e6ebd9; }
  .thumb { width: 100%; height: auto; border-radius: 8px; display: block; }
  .lname { font-size: 13px; font-weight: 700; color: var(--pine); margin-top: 6px; }
  .ldesc { font-size: 10.5px; color: var(--leaf); }
  .flags { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; }
  .fchip { display: flex; align-items: center; gap: 9px; cursor: pointer; border: 2px solid transparent; background: #eef1e6; border-radius: 11px; padding: 7px 9px; font-family: inherit; text-align: left; transition: border-color .12s, background .12s; }
  .fchip:hover { background: #e6ebd9; }
  .fchip.on { border-color: var(--pine); background: #e6ebd9; }
  .fsw { width: 22px; height: 22px; border-radius: 6px; flex: none; box-shadow: inset 0 0 0 1px rgba(10,33,31,0.12); }
  .fnm { font-size: 12.5px; font-weight: 600; color: var(--pine); white-space: nowrap; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .seg { display: flex; background: #eef1e6; border-radius: 11px; padding: 4px; gap: 4px; }
  .seg button { flex: 1; border: none; cursor: pointer; font-family: inherit; font-weight: 600; font-size: 13px; padding: 9px 4px; border-radius: 8px; background: transparent; color: var(--leaf); transition: background .12s, color .12s; }
  .seg button.on { background: var(--pine); color: var(--cloud); }
  .download { background: var(--spark); color: var(--pine); font-size: 16px; font-weight: 700; padding: 16px; box-shadow: 0 8px 22px rgba(216,255,133,0.18); }
  .download:hover { box-shadow: 0 10px 26px rgba(216,255,133,0.3); }
  .foot { text-align: center; margin: 0; font-size: 12px; font-style: italic; color: var(--leaf); }
  @media (max-width: 900px) {
    .stagewrap { grid-template-columns: 1fr; }
    .stage { position: static; }
    .panel { position: static; max-height: none; }
    .panel-body { overflow: visible; }
    .canvasbox canvas { max-width: 420px; }
  }
</style>
</head>

      const rr = Math.min(r, w/2, h/2);
      ctx.moveTo(x+rr, y); ctx.arcTo(x+w, y, x+w, y+h, rr);
      ctx.arcTo(x+w, y+h, x, y+h, rr); ctx.arcTo(x, y+h, x, y, rr);
      ctx.arcTo(x, y, x+w, y, rr); ctx.closePath();
    }
  }
  function drawPhoto(ctx, x, y, w, h, photo) {
    const img = photo.img, iw = img.naturalWidth, ih = img.naturalHeight;
    const base = Math.max(w/iw, h/ih), z = photo.scale||1;
    const dw = iw*base*z, dh = ih*base*z;
    const mx = (dw-w)/2, my = (dh-h)/2;
    const ox = Math.max(-mx, Math.min(mx, photo.ox||0));
    const oy = Math.max(-my, Math.min(my, photo.oy||0));
    ctx.drawImage(img, x+(w-dw)/2+ox, y+(h-dh)/2+oy, dw, dh);
  }
  function imageIcon(ctx, cx, cy, s, color) {
    ctx.save(); ctx.strokeStyle=color; ctx.fillStyle=color;
    ctx.lineWidth=s*0.07; ctx.lineJoin='round';
    const x=cx-s/2, y=cy-s/2, rr=s*0.14;
    ctx.beginPath(); ctx.moveTo(x+rr,y); ctx.arcTo(x+s,y,x+s,y+s,rr);
    ctx.arcTo(x+s,y+s,x,y+s,rr); ctx.arcTo(x,y+s,x,y,rr);
    ctx.arcTo(x,y,x+s,y,rr); ctx.closePath(); ctx.stroke();
    ctx.beginPath(); ctx.arc(x+s*0.32,y+s*0.33,s*0.08,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.moveTo(x+s*0.12,y+s*0.82); ctx.lineTo(x+s*0.42,y+s*0.48);
    ctx.lineTo(x+s*0.62,y+s*0.68); ctx.lineTo(x+s*0.78,y+s*0.5);
    ctx.lineTo(x+s*0.9,y+s*0.64); ctx.stroke(); ctx.restore();
  }
  function placeholder(ctx, x, y, w, h, crop, r, label) {
    ctx.save(); pathShape(ctx,x,y,w,h,crop,r);
    ctx.fillStyle='#E9ECE2'; ctx.fill(); ctx.clip();
    ctx.strokeStyle='rgba(10,33,31,0.05)'; ctx.lineWidth=w*0.012;
    for(let i=-h;i<w;i+=w*0.05){ctx.beginPath();ctx.moveTo(x+i,y);ctx.lineTo(x+i+h,y+h);ctx.stroke();}
    imageIcon(ctx, x+w/2, y+h*0.42, w*0.2, 'rgba(10,33,31,0.45)');
    ctx.fillStyle='rgba(10,33,31,0.55)'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font=`600 ${w*0.062}px "Inter Tight", sans-serif`;
    ctx.fillText(label||'DROP YOUR PHOTO', x+w/2, y+h*0.66); ctx.restore();
  }
  function paintStripes(ctx, x, y, w, h, colors, orient) {
    const n=colors.length;
    if(orient==='vertical'){const bw=w/n;for(let i=0;i<n;i++){ctx.fillStyle=colors[i];ctx.fillRect(x+i*bw,y,Math.ceil(bw)+1,h);}}
    else{const bh=h/n;for(let i=0;i<n;i++){ctx.fillStyle=colors[i];ctx.fillRect(x,y+i*bh,w,Math.ceil(bh)+1);}}
  }
  function paintRing(ctx, x, y, w, h, flag) {
    ctx.fillStyle=flag.field; ctx.fillRect(x,y,w,h);
    ctx.strokeStyle=flag.ring; const R=Math.min(w,h)*0.45;
    ctx.lineWidth=Math.min(w,h)*0.085;
    ctx.beginPath(); ctx.arc(x+w/2,y+h/2,R,0,Math.PI*2); ctx.stroke();
  }
  function paintFlag(ctx, x, y, w, h, flag, orient) {
    if(flag.type==='ring') return paintRing(ctx,x,y,w,h,flag);
    return paintStripes(ctx,x,y,w,h,flag.colors,orient||'horizontal');
  }
  function drawHeart(ctx, heart, cx, cy, w, shadow) {
    if(!heart) return;
    const h=w*(heart.naturalHeight/heart.naturalWidth);
    ctx.save();
    if(shadow){ctx.shadowColor='rgba(10,33,31,0.28)';ctx.shadowBlur=w*0.12;ctx.shadowOffsetY=w*0.04;}
    ctx.drawImage(heart,cx-w/2,cy-h/2,w,h); ctx.restore();
  }
  function yearPill(ctx, cx, cy, S, text, bg, fg) {
    ctx.save(); ctx.font=`700 ${S*0.052}px "Inter Tight", sans-serif`;
    const tw=ctx.measureText(text).width, padX=S*0.038, padY=S*0.026;
    const w=tw+padX*2, h=S*0.052+padY*2, x=cx-w/2, y=cy-h/2, r=h/2;
    ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
    ctx.fillStyle=bg; ctx.fill();
    ctx.fillStyle=fg; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(text,cx,cy+h*0.02); ctx.restore();
  }
  function layoutFrame(ctx, o) {
    const S=o.size, m=S*0.115, ps=S-m*2, crop=o.crop, r=S*0.12, gap=S*0.03;
    paintFlag(ctx,0,0,S,S,o.flag,'horizontal');
    ctx.save(); ctx.shadowColor='rgba(10,33,31,0.30)'; ctx.shadowBlur=S*0.05; ctx.shadowOffsetY=S*0.015;
    pathShape(ctx,m-gap,m-gap,ps+gap*2,ps+gap*2,crop,r+gap); ctx.fillStyle=B.cloud; ctx.fill(); ctx.restore();
    ctx.save(); pathShape(ctx,m,m,ps,ps,crop,r); ctx.clip();
    if(o.photo&&o.photo.img) drawPhoto(ctx,m,m,ps,ps,o.photo);
    else placeholder(ctx,m,m,ps,ps,crop,r); ctx.restore();
    ctx.save(); pathShape(ctx,m,m,ps,ps,crop,r);
    ctx.lineWidth=S*0.004; ctx.strokeStyle='rgba(10,33,31,0.16)'; ctx.stroke(); ctx.restore();
    drawHeart(ctx,o.heart,S*0.85,S*0.85,S*0.19,true);
    if(o.showYear) yearPill(ctx,S*0.145,S*0.092,S,'2026',B.pine,B.spark);
  }
  function layoutColumns(ctx, o) {
    const S=o.size, crop=o.crop, cs=S*0.56, pad=S*0.03, r=S*0.06;
    ctx.fillStyle=B.pine; ctx.fillRect(0,0,S,S);
    paintFlag(ctx,0,0,S,S,o.flag,'vertical');
    ctx.save(); ctx.translate(S/2,S*0.5); ctx.rotate(-4*Math.PI/180);
    ctx.shadowColor='rgba(10,33,31,0.4)'; ctx.shadowBlur=S*0.06; ctx.shadowOffsetY=S*0.022;
    pathShape(ctx,-cs/2-pad,-cs/2-pad,cs+pad*2,cs+pad*2,crop,r+pad); ctx.fillStyle=B.cloud; ctx.fill();
    ctx.shadowColor='transparent';
    ctx.save(); pathShape(ctx,-cs/2,-cs/2,cs,cs,crop,r); ctx.clip();
    if(o.photo&&o.photo.img) drawPhoto(ctx,-cs/2,-cs/2,cs,cs,o.photo);
    else placeholder(ctx,-cs/2,-cs/2,cs,cs,crop,r); ctx.restore();
    pathShape(ctx,-cs/2,-cs/2,cs,cs,crop,r);
    ctx.lineWidth=S*0.004; ctx.strokeStyle='rgba(10,33,31,0.16)'; ctx.stroke(); ctx.restore();
    drawHeart(ctx,o.heart,S*0.255,S*0.235,S*0.185,true);
    yearPill(ctx,S/2,S*0.915,S,o.showYear?'PRIDE 2026':'PRIDE',B.pine,B.spark);
  }
  function layoutBeam(ctx, o) {
    const S=o.size, crop=o.crop, r=S*0.12, ang=-9*Math.PI/180;
    ctx.save(); pathShape(ctx,0,0,S,S,crop,r); ctx.clip();
    if(o.photo&&o.photo.img){ctx.fillStyle=B.pine;ctx.fillRect(0,0,S,S);drawPhoto(ctx,0,0,S,S,o.photo);}
    else placeholder(ctx,0,0,S,S,'rounded',0.0001,'DROP YOUR PHOTO');
    const g=ctx.createLinearGradient(0,S*0.45,0,S);
    g.addColorStop(0,'rgba(10,33,31,0)'); g.addColorStop(1,'rgba(10,33,31,0.55)');
    ctx.fillStyle=g; ctx.fillRect(0,0,S,S);
    ctx.save(); ctx.translate(S*0.5,S*0.87); ctx.rotate(ang);
    const bw=S*1.9, bh=S*0.185;
    ctx.fillStyle=B.pine; ctx.fillRect(-bw/2,-bh/2-S*0.013,bw,bh+S*0.026);
    paintFlag(ctx,-bw/2,-bh/2,bw,bh,o.flag,'vertical');
    ctx.fillStyle=B.spark; ctx.fillRect(-bw/2,-bh/2-S*0.013,bw,S*0.006);
    ctx.restore(); ctx.restore();
    drawHeart(ctx,o.heart,S*0.155,S*0.155,S*0.17,true);
    if(o.showYear) yearPill(ctx,S*0.84,S*0.13,S,'2026',B.pine,B.spark);
  }
  const LAYOUTS={frame:layoutFrame,columns:layoutColumns,beam:layoutBeam};
  window.PrideRender={
    render(ctx,o){ctx.clearRect(0,0,o.size,o.size);(LAYOUTS[o.layout]||layoutFrame)(ctx,o);},
    layouts:['frame','columns','beam'],
  };
})();
</script>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;
const PREVIEW = 1080;
const EXPORT  = 1080;

function swatchBg(flag) {
  if (flag.type === 'ring') return `linear-gradient(180deg, ${flag.field} 50%, ${flag.ring} 50%)`;
  const n = flag.colors.length;
  const stops = flag.colors.map((c,i)=>`${c} ${(i/n)*100}% ${((i+1)/n)*100}%`);
  return `linear-gradient(180deg, ${stops.join(',')})`;
}

function useImage(src) {
  const [img, setImg] = useState(null);
  useEffect(() => {
    if (!src) return;
    const i = new Image();
    i.onload = () => setImg(i);
    i.src = src;
  }, [src]);
  return img;
}

const LAYOUT_META = [
  { id:'frame',   name:'Frame',   desc:'Striped border' },
  { id:'columns', name:'Columns', desc:'Flag stripes' },
  { id:'beam',    name:'Beam',    desc:'Photo-forward' },
];

function App() {
  const saved = (() => { try { return JSON.parse(localStorage.getItem('superside-pride')||'{}'); } catch(e) { return {}; } })();
  const [layout,   setLayout]   = useState(saved.layout  || 'frame');
  const [flagId,   setFlagId]   = useState(saved.flagId  || 'rainbow');
  const [crop,     setCrop]     = useState(saved.crop    || 'rounded');
  const [showYear, setShowYear] = useState(saved.showYear !== false);
  const [scale,    setScale]    = useState(1);
  const [offset,   setOffset]   = useState({x:0,y:0});
  const [imgEl,    setImgEl]    = useState(null);
  const [fileName, setFileName] = useState('');
  const [dragOver, setDragOver] = useState(false);
  const [fontsReady, setFontsReady] = useState(false);

  const canvasRef = useRef(null);
  const fileRef   = useRef(null);
  const heart = useImage(window.HEART_B64);
  const flag  = FLAGS.find(f => f.id === flagId) || FLAGS[0];

  useEffect(() => {
    localStorage.setItem('superside-pride', JSON.stringify({layout,flagId,crop,showYear}));
  }, [layout,flagId,crop,showYear]);

  useEffect(() => {
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(()=>setFontsReady(true));
    else setFontsReady(true);
  }, []);

  const stateRef = useRef(null);
  stateRef.current = {flag,layout,crop,showYear,heart,imgEl,scale,offset,fontsReady};

  const renderTo = useCallback((ctx, size) => {
    const s = stateRef.current, k = size/PREVIEW;
    PrideRender.render(ctx, {
      size, flag:s.flag, layout:s.layout, crop:s.crop, showYear:s.showYear, heart:s.heart,
      photo: s.imgEl ? {img:s.imgEl, scale:s.scale, ox:s.offset.x*k, oy:s.offset.y*k} : null,
    });
  }, []);

  useEffect(() => {
    let raf, sig='';
    const loop = () => {
      const c = canvasRef.current;
      if (c) {
        const s = stateRef.current;
        const next = [s.flag.id,s.layout,s.crop,s.showYear,!!s.imgEl,s.scale,Math.round(s.offset.x),Math.round(s.offset.y),!!s.heart,s.fontsReady].join('|');
        if (next !== sig) { sig=next; renderTo(c.getContext('2d'), PREVIEW); }
      }
      raf = requestAnimationFrame(loop);
    };
    raf = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf);
  }, [renderTo]);

  const loadFile = useCallback((file) => {
    if (!file || !file.type.startsWith('image/')) return;
    setFileName(file.name);
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => { setImgEl(img); setScale(1); setOffset({x:0,y:0}); };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }, []);

  useEffect(() => {
    const onPaste = (e) => {
      const items = e.clipboardData && e.clipboardData.items;
      if (!items) return;
      for (const it of items) { if (it.type.startsWith('image/')) { loadFile(it.getAsFile()); break; } }
    };
    window.addEventListener('paste', onPaste);
    return () => window.removeEventListener('paste', onPaste);
  }, [loadFile]);

  const dragState = useRef(null);
  const onPointerDown = (e) => {
    if (!imgEl) { fileRef.current && fileRef.current.click(); return; }
    const rect = canvasRef.current.getBoundingClientRect(), k = PREVIEW/rect.width;
    dragState.current = {x:e.clientX, y:e.clientY, ox:offset.x, oy:offset.y, k};
    e.currentTarget.setPointerCapture(e.pointerId);
  };
  const onPointerMove = (e) => {
    const d = dragState.current; if (!d) return;
    setOffset({x:d.ox+(e.clientX-d.x)*d.k, y:d.oy+(e.clientY-d.y)*d.k});
  };
  const onPointerUp = (e) => {
    dragState.current = null;
    try { e.currentTarget.releasePointerCapture(e.pointerId); } catch(err){}
  };
  const onWheel = (e) => {
    if (!imgEl) return; e.preventDefault();
    setScale(s => Math.max(1, Math.min(3, s - e.deltaY*0.0015)));
  };

  const download = () => {
    const c = document.createElement('canvas'); c.width = c.height = EXPORT;
    renderTo(c.getContext('2d'), EXPORT);
    const a = document.createElement('a');
    a.download = `superside-pride-2026-${flag.id}.png`;
    a.href = c.toDataURL('image/png'); a.click();
  };

  return (
    <div className="wrap">
      <header className="hd">
        <img className="hd-heart" src={window.HEART_B64} alt="" />
        <div className="hd-text">
          <h1>Pride <span>2026</span> Profile Maker</h1>
          <p>Drop your photo, pick your flag, make it yours. Built for your Slack avatar.</p>
        </div>
      </header>
      <div className="stagewrap">
        <section className="stage">
          <div
            className={'canvasbox '+(dragOver?'over':'')}
            onDragOver={e=>{e.preventDefault();setDragOver(true);}}
            onDragLeave={()=>setDragOver(false)}
            onDrop={e=>{e.preventDefault();setDragOver(false);loadFile(e.dataTransfer.files[0]);}}
          >
            <canvas ref={canvasRef} width={PREVIEW} height={PREVIEW}
              onPointerDown={onPointerDown} onPointerMove={onPointerMove}
              onPointerUp={onPointerUp} onWheel={onWheel}
              style={{cursor:imgEl?'grab':'pointer'}}
            />
          </div>
          <div className="stagehint">
            {imgEl ? 'Drag to reposition · scroll to zoom' : 'Click the canvas or drop / paste an image'}
          </div>
        </section>
        <aside className="panel">
          <div className="panel-body">
            <div className="block">
              <label className="lbl">Your photo</label>
              <button className="btn block-btn" onClick={()=>fileRef.current.click()}>
                {imgEl ? 'Replace photo' : 'Upload photo'}
              </button>
              {imgEl && <div className="fname">{fileName||'image'}</div>}
              <input ref={fileRef} type="file" accept="image/*" hidden onChange={e=>loadFile(e.target.files[0])} />
              <div className="zoomrow">
                <span className="zlbl">Zoom</span>
                <input type="range" min="1" max="3" step="0.01" value={scale}
                  disabled={!imgEl} onChange={e=>setScale(parseFloat(e.target.value))} />
              </div>
            </div>
            <div className="block">
              <label className="lbl">Layout</label>
              <div className="layouts">
                {LAYOUT_META.map(l => (
                  <button key={l.id} className={'lcard '+(layout===l.id?'on':'')} onClick={()=>setLayout(l.id)}>
                    <LayoutThumb id={l.id} flag={flag} heart={heart} crop={crop} fontsReady={fontsReady} />
                    <span className="lname">{l.name}</span>
                    <span className="ldesc">{l.desc}</span>
                  </button>
                ))}
              </div>
            </div>
            <div className="block">
              <label className="lbl">Flag</label>
              <div className="flags">
                {FLAGS.map(f => (
                  <button key={f.id} className={'fchip '+(flagId===f.id?'on':'')} title={f.name} onClick={()=>setFlagId(f.id)}>
                    <span className="fsw" style={{background:swatchBg(f)}} />
                    <span className="fnm">{f.name}</span>
                  </button>
                ))}
              </div>
            </div>
            <div className="block row2">
              <div>
                <label className="lbl">Crop</label>
                <div className="seg">
                  <button className={crop==='rounded'?'on':''} onClick={()=>setCrop('rounded')}>Rounded</button>
                  <button className={crop==='circle'?'on':''} onClick={()=>setCrop('circle')}>Circle</button>
                </div>
              </div>
              <div>
                <label className="lbl">Year badge</label>
                <div className="seg">
                  <button className={showYear?'on':''} onClick={()=>setShowYear(true)}>2026</button>
                  <button className={!showYear?'on':''} onClick={()=>setShowYear(false)}>Off</button>
                </div>
              </div>
            </div>
          </div>
          <div className="panel-foot">
            <button className="btn download" onClick={download}>Download PNG</button>
            <p className="foot">Your creative team's creative team™</p>
          </div>
        </aside>
      </div>
    </div>
  );
}

function LayoutThumb({id, flag, heart, crop, fontsReady}) {
  const ref = useRef(null);
  useEffect(() => {
    const c = ref.current; if (!c) return;
    PrideRender.render(c.getContext('2d'), {size:132, flag, layout:id, crop, showYear:false, heart, photo:null});
  }, [id, flag, heart, crop, fontsReady]);
  return <canvas ref={ref} width="132" height="132" className="thumb" />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
